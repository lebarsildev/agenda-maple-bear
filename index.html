<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maple Bear · Agenda do Mateus</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F2A44">
<link rel="apple-touch-icon" href="icone-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1F2A44;
    --navy-2: #2A3757;
    --red: #C8402A;
    --red-soft: #E8DCD2;
    --bg: #F2F0EC;
    --card: #FFFFFF;
    --ink: #22293B;
    --muted: #7B8194;
    --line: #E7E4DE;
    --chip: #EDEAE4;
    --green: #2E8B57;
    --amber: #C77E00;
    --blue: #3B5FA0;
    --shadow: 0 2px 10px rgba(31,42,68,.07);
    --shadow-lg: 0 10px 30px rgba(31,42,68,.14);
  }
  [data-theme="dark"] {
    --navy: #141C30;
    --navy-2: #1D2740;
    --bg: #0F1524;
    --card: #1B2438;
    --ink: #E8EAF2;
    --muted: #9AA3B8;
    --line: #2A3550;
    --chip: #253049;
    --red-soft: #3A2C29;
    --shadow: 0 2px 10px rgba(0,0,0,.35);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body {
    font-family:'Nunito',-apple-system,sans-serif; background:var(--bg); color:var(--ink);
    min-height:100vh; transition:background .3s,color .3s;
  }
  .shell { max-width:520px; margin:0 auto; min-height:100vh; position:relative; }

  /* ---------- LOGIN ---------- */
  #login {
    position:fixed; inset:0; background:linear-gradient(160deg,var(--navy) 0%,#31282E 70%,#4A2A22 100%);
    display:flex; align-items:center; justify-content:center; z-index:200; padding:24px;
  }
  #login .card {
    background:var(--card); border-radius:24px; padding:38px 30px; width:360px; max-width:100%;
    text-align:center; box-shadow:var(--shadow-lg); animation:pop .4s ease;
  }
  @keyframes pop { from { transform:scale(.94); opacity:0 } to { transform:scale(1); opacity:1 } }
  #login .bear {
    width:76px; height:76px; margin:0 auto 14px; background:radial-gradient(circle at 35% 30%,#B5502F,#7E3018);
    border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px;
    box-shadow:0 6px 18px rgba(126,48,24,.4);
  }
  #login h1 { font-size:21px; font-weight:900; color:var(--ink); }
  #login .sub { font-size:13px; color:var(--muted); margin:4px 0 22px; }
  #login input {
    width:100%; padding:14px 16px; border:2px solid var(--line); background:var(--bg); color:var(--ink);
    border-radius:14px; font-size:16px; font-family:inherit; margin-bottom:12px; outline:none; transition:border .2s;
  }
  #login input:focus { border-color:var(--red); }
  #login button {
    width:100%; padding:14px; background:var(--red); color:#fff; border:none; border-radius:14px;
    font-size:16px; font-weight:800; font-family:inherit; cursor:pointer; transition:transform .1s;
  }
  #login button:active { transform:scale(.97); }
  #loginErro { color:var(--red); font-size:13px; font-weight:700; margin-top:10px; display:none; }

  /* ---------- HEADER ---------- */
  #app { display:none; padding-bottom:86px; }
  header {
    position:sticky; top:0; z-index:50; background:var(--navy); color:#fff;
    padding:14px 16px; display:flex; align-items:center; gap:12px;
    border-bottom:4px solid var(--red);
  }
  header .bear {
    width:44px; height:44px; flex:none; background:radial-gradient(circle at 35% 30%,#B5502F,#7E3018);
    border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px;
    box-shadow:0 0 0 2px rgba(255,255,255,.25);
  }
  header .t { flex:1; min-width:0; }
  header .t b { display:block; font-size:16.5px; font-weight:900; }
  header .t span { font-size:12px; opacity:.75; font-weight:600; }
  .badge {
    background:var(--red); font-size:12px; font-weight:800; padding:6px 12px; border-radius:20px; white-space:nowrap;
  }
  .hbtn {
    background:rgba(255,255,255,.12); border:none; color:#fff; width:38px; height:38px; border-radius:12px;
    font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:none;
  }
  .hbtn.sair { width:auto; padding:0 14px; font-size:13px; font-weight:800; font-family:inherit; }

  main { padding:16px 16px 8px; }

  /* ---------- CARDS ---------- */
  .hero {
    background:linear-gradient(150deg,var(--navy) 0%,var(--navy-2) 100%); color:#fff;
    border-radius:22px; padding:24px 22px; margin-bottom:16px; position:relative; overflow:hidden; box-shadow:var(--shadow-lg);
  }
  .hero::after {
    content:"🍁"; position:absolute; right:-14px; top:-18px; font-size:110px; opacity:.10; transform:rotate(18deg);
  }
  .hero .ola { font-size:11.5px; font-weight:800; letter-spacing:1.6px; text-transform:uppercase; opacity:.65; }
  .hero h2 { font-size:26px; font-weight:900; margin:4px 0 2px; }
  .hero .sub { font-size:13.5px; opacity:.8; font-weight:600; }
  .stats { display:flex; gap:10px; margin-top:18px; }
  .stat {
    flex:1; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.08);
    border-radius:14px; padding:12px 8px; text-align:center;
  }
  .stat b { display:block; font-size:22px; font-weight:900; }
  .stat span { font-size:11px; font-weight:700; opacity:.7; }
  .stat.red b { color:#FF9E8E; } .stat.green b { color:#8FE3B0; }

  .card { background:var(--card); border-radius:18px; padding:18px; margin-bottom:14px; box-shadow:var(--shadow); }
  .card h3 {
    font-size:12px; font-weight:900; letter-spacing:1.4px; text-transform:uppercase; color:var(--muted);
    display:flex; align-items:center; gap:8px; margin-bottom:14px;
  }
  .card h3 .em { font-size:16px; }
  .prog-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .prog-head b { font-size:15px; font-weight:900; }
  .prog-head span { font-size:16px; font-weight:900; color:var(--red); }
  .bar { height:10px; background:var(--chip); border-radius:8px; overflow:hidden; }
  .bar i { display:block; height:100%; background:linear-gradient(90deg,var(--red),#E06A3F); border-radius:8px; transition:width .8s ease; }
  .prog-sub { font-size:12.5px; color:var(--muted); font-weight:600; margin-top:8px; }

  /* eventos */
  .ev { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--line); }
  .ev:last-child { border-bottom:none; padding-bottom:2px; }
  .ev-data {
    flex:none; width:64px; text-align:center; background:var(--chip); border-radius:12px; padding:8px 4px;
  }
  .ev-data b { display:block; font-size:14px; font-weight:900; color:var(--red); }
  .ev-data span { font-size:10.5px; font-weight:800; color:var(--muted); text-transform:uppercase; }
  .ev-txt { flex:1; min-width:0; }
  .ev-txt b { display:block; font-size:14.5px; font-weight:800; }
  .ev-txt span { font-size:12px; color:var(--muted); font-weight:600; }
  .pill { flex:none; font-size:10px; font-weight:900; letter-spacing:.5px; padding:4px 9px; border-radius:8px; text-transform:uppercase; }
  .pill.avaliacao { background:var(--red-soft); color:var(--red); }
  .pill.recesso { background:#F1E4CC; color:#8A6100; }
  .pill.evento { background:#DEF0E5; color:var(--green); }
  .pill.tarefa { background:#E1E9F7; color:var(--blue); }
  [data-theme="dark"] .pill.recesso { background:#3A3120; }
  [data-theme="dark"] .pill.evento { background:#1E3428; }
  [data-theme="dark"] .pill.tarefa { background:#22304A; }

  /* busca + chips */
  .busca {
    display:flex; align-items:center; gap:10px; background:var(--card); border-radius:16px;
    padding:13px 16px; margin-bottom:12px; box-shadow:var(--shadow);
  }
  .busca input { flex:1; border:none; outline:none; background:none; font-family:inherit; font-size:15px; color:var(--ink); }
  .chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:10px; margin-bottom:6px; scrollbar-width:none; }
  .chips::-webkit-scrollbar { display:none; }
  .chip {
    flex:none; border:none; font-family:inherit; font-size:13px; font-weight:800; padding:8px 16px;
    border-radius:20px; background:var(--card); color:var(--muted); cursor:pointer; box-shadow:var(--shadow);
  }
  .chip.on { background:var(--red); color:#fff; }

  /* agenda */
  .dia {
    display:inline-block; background:var(--navy); color:#fff; font-size:13px; font-weight:900;
    padding:7px 16px; border-radius:20px; margin:6px 0 12px;
  }
  [data-theme="dark"] .dia { background:var(--red); }
  .reg-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:6px; }
  .reg-head b { font-size:15px; font-weight:900; }
  .reg-head .tag2 { font-size:10.5px; font-weight:900; padding:4px 10px; border-radius:8px; text-transform:uppercase; }
  .tag2.Agenda { background:#FFF3DC; color:var(--amber); }
  .tag2.Portfolio { background:#DEF0E5; color:var(--green); }
  [data-theme="dark"] .tag2.Agenda { background:#3A3120; }
  [data-theme="dark"] .tag2.Portfolio { background:#1E3428; }
  .mat { border-top:1px solid var(--line); }
  .mat-h {
    display:flex; align-items:center; gap:11px; padding:12px 2px; cursor:pointer; user-select:none;
  }
  .mat-h .ic { font-size:19px; width:26px; text-align:center; flex:none; }
  .mat-h b { flex:1; font-size:14.5px; font-weight:800; }
  .mat-h .ar { color:var(--muted); font-size:11px; transition:transform .25s; }
  .mat.open .ar { transform:rotate(180deg); }
  .mat-b { display:none; font-size:14px; line-height:1.6; color:var(--ink); opacity:.92; padding:0 2px 14px 39px; white-space:pre-wrap; }
  .mat.open .mat-b { display:block; animation:fade .25s ease; }
  @keyframes fade { from { opacity:0; transform:translateY(-4px) } to { opacity:1; transform:none } }

  /* tarefas */
  .task { display:flex; gap:13px; }
  .task .cb {
    flex:none; width:26px; height:26px; border:2.5px solid var(--line); border-radius:9px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:15px; color:#fff; margin-top:2px; transition:.2s;
  }
  .task.done .cb { background:var(--green); border-color:var(--green); }
  .task .tx { flex:1; min-width:0; }
  .task .tx b { font-size:15.5px; font-weight:900; display:block; margin-bottom:6px; }
  .task.done .tx b { text-decoration:line-through; opacity:.55; }
  .task .metas { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
  .task .m { font-size:11px; font-weight:800; background:var(--chip); color:var(--muted); padding:4px 10px; border-radius:8px; }
  .task .m.hot { background:var(--red-soft); color:var(--red); }
  .task p { font-size:13.5px; line-height:1.55; color:var(--muted); font-weight:600; }
  .st { flex:none; font-size:10.5px; font-weight:900; padding:5px 11px; border-radius:20px; height:fit-content; }
  .st.pend { background:var(--navy); color:#fff; }
  .st.ok { background:#DEF0E5; color:var(--green); }
  [data-theme="dark"] .st.ok { background:#1E3428; }

  /* avisos */
  .aviso { border-left:5px solid var(--muted); }
  .aviso.Avaliação { border-color:var(--red); } .aviso.Tarefa { border-color:var(--amber); }
  .aviso.Aviso { border-color:var(--navy); } .aviso.Evento { border-color:var(--green); }
  .aviso.Atividade { border-color:var(--blue); }
  .av-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .av-head b { font-size:16px; font-weight:900; line-height:1.3; }
  .av-cat { flex:none; font-size:10.5px; font-weight:900; background:var(--chip); color:var(--muted); padding:5px 11px; border-radius:20px; }
  .av-meta { font-size:12.5px; color:var(--muted); font-weight:700; margin:5px 0 10px; }
  .aviso p { font-size:14px; line-height:1.6; white-space:pre-wrap; }
  .aviso p.clamp { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .ler { background:none; border:none; font-family:inherit; font-size:13.5px; font-weight:900; color:var(--red); cursor:pointer; padding:10px 0 0; }
  .anexo { display:inline-block; margin-top:10px; font-size:12px; font-weight:800; color:var(--blue); background:var(--chip); padding:5px 12px; border-radius:8px; }

  /* bottom nav */
  nav.tabs {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; z-index:60;
    background:var(--card); border-top:1px solid var(--line); display:flex;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom)); box-shadow:0 -4px 20px rgba(31,42,68,.08);
  }
  nav.tabs button {
    flex:1; background:none; border:none; font-family:inherit; cursor:pointer; color:var(--muted);
    font-size:10.5px; font-weight:800; display:flex; flex-direction:column; align-items:center; gap:3px; padding:4px 0; position:relative;
  }
  nav.tabs button svg { width:23px; height:23px; stroke:currentColor; fill:none; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; }
  nav.tabs button.on { color:var(--red); }
  nav.tabs button.on::before {
    content:""; position:absolute; top:-9px; width:26px; height:3px; background:var(--red); border-radius:2px;
  }
  nav.tabs .nbadge {
    position:absolute; top:-2px; right:calc(50% - 20px); background:var(--red); color:#fff;
    font-size:9.5px; font-weight:900; min-width:16px; height:16px; border-radius:9px;
    display:flex; align-items:center; justify-content:center; padding:0 4px;
  }
  .vazio { text-align:center; color:var(--muted); padding:44px 0; font-size:14px; font-weight:700; }
  .rodape { text-align:center; font-size:11.5px; color:var(--muted); font-weight:600; padding:10px 0 4px; }
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="bear">🐻</div>
    <h1>Maple Bear · Big Bears</h1>
    <div class="sub">Agenda do Mateus · acesso da família</div>
    <input type="password" id="senha" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')entrar()">
    <button onclick="entrar()">Entrar 🍁</button>
    <div id="loginErro">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<div class="shell">
<div id="app">
  <header>
    <div class="bear">🐻</div>
    <div class="t"><b>Maple Bear · Big Bears</b><span id="hSub"></span></div>
    <span class="badge" id="hPend"></span>
    <button class="hbtn" id="btTheme" title="Modo escuro">🌙</button>
    <button class="hbtn sair" onclick="sair()">Sair</button>
  </header>

  <main id="conteudo"></main>
  <div class="rodape" id="rodape"></div>

  <nav class="tabs">
    <button data-v="inicio" class="on">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V21h14V9.5"/><path d="M10 21v-6h4v6"/></svg>
      Início
    </button>
    <button data-v="agenda">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/></svg>
      Agenda
    </button>
    <button data-v="tarefas" id="tabTarefas">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12.5l3 3 5-6"/></svg>
      Tarefas
    </button>
    <button data-v="avisos">
      <svg viewBox="0 0 24 24"><path d="M3 10v4h3l6 5V5l-6 5H3z"/><path d="M16.5 8.5a5 5 0 010 7"/></svg>
      Avisos
    </button>
    <button data-v="calendario">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
      Eventos
    </button>
  </nav>
</div>
</div>

<script src="dados.enc.js"></script>
<script>
async function descriptografar(senha){
  var e=window.AGENDA_ENC;
  function b64(s){var b=atob(s),a=new Uint8Array(b.length);for(var i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(senha),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(e.salt),iterations:250000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(e.iv)},key,b64(e.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
var vista = "inicio";
var NOVO_CUTOFF = 0;
var filtroAviso = "Todos";
var buscas = { agenda:"", avisos:"" };
var MESES = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
var DIAS = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
function pDate(s){ var m=String(s).match(/(\d{2})\/(\d{2})\/(\d{4})/); return m?new Date(+m[3],+m[2]-1,+m[1]):null; }
function fmtCurta(d){ return ("0"+d.getDate()).slice(-2)+"/"+("0"+(d.getMonth()+1)).slice(-2); }
function hoje0(){ var h=new Date(); h.setHours(0,0,0,0); return h; }
function store(k,v){ try{ if(v===undefined) return localStorage.getItem(k); localStorage.setItem(k,v); }catch(e){ return null; } }

/* classifica anúncio */
function catAviso(a){
  var t=(a.titulo+" "+a.texto).toLowerCase();
  if(/avalia|av1|av2|av3|prova|knowledge fair/.test(t)) return "Avaliação";
  if(/leitura|prazo|até o dia|tarefa|entrega/.test(t)) return "Tarefa";
  if(/portal|acesso|cardápio|newsletter|inscri/.test(t)) return "Atividade";
  if(/day|festa|colônia|comemora|celebra|aniversári|100 days/.test(t)) return "Evento";
  return "Aviso";
}
/* parse matérias de um registro */
var MATERIAS = [
  ["GEOGRAFIA","🌍"],["HISTÓRIA","📜"],["HISTORIA","📜"],["SCIENCE","🔬"],["MATH","🔢"],
  ["ELA","✏️"],["PLA","📚"],["LÍNGUA PORTUGUESA","📚"],["ASSEMBLY","🍁"],["MÚSICA","🎵"],
  ["MUSICA","🎵"],["EDUCAÇÃO FÍSICA","⚽"],["ARTS","🎨"],["ARTES","🎨"]
];
function parseMaterias(txt){
  var re=/(GEOGRAFIA|HIST[ÓO]RIA|SCIENCE|MATH|ELA|PLA|L[ÍI]NGUA PORTUGUESA|ASSEMBLY|M[ÚU]SICA|EDUCA[ÇC][ÃA]O F[ÍI]SICA|ARTS|ARTES)\s*:/gi;
  var out=[], m, marks=[];
  while((m=re.exec(txt))!==null) marks.push({i:m.index, nome:m[1].toUpperCase(), len:m[0].length});
  if(!marks.length) return [{nome:null, ic:"🧸", corpo:txt}];
  var pre=txt.slice(0,marks[0].i).replace(/[—-]\s*$/,"").trim();
  if(pre) out.push({nome:"Rotina", ic:"🧘", corpo:pre});
  for(var k=0;k<marks.length;k++){
    var fim = k+1<marks.length ? marks[k+1].i : txt.length;
    var corpo = txt.slice(marks[k].i+marks[k].len, fim).trim();
    corpo = corpo.replace(/^[\s.:—-]+|[🌍📜🔬🔢✏️📚🍁🎵⚽🎨]\s*$/g,"").trim();
    var ic="✏️";
    for(var j=0;j<MATERIAS.length;j++) if(MATERIAS[j][0]===marks[k].nome){ ic=MATERIAS[j][1]; break; }
    var nome = marks[k].nome.charAt(0)+marks[k].nome.slice(1).toLowerCase();
    if(nome==="Ela"||nome==="Pla") nome=marks[k].nome;
    if(nome==="Math") nome="Math";
    out.push({nome:nome, ic:ic, corpo:corpo});
  }
  return out;
}
/* tarefas derivadas da base */
function getTarefas(){
  var d=window.AGENDA_DATA, h=hoje0(), out=[];
  d.calendario.forEach(function(c,i){
    if(c.tipo!=="tarefa") return;
    var fim=pDate(c.fim), id="t_"+c.evento.slice(0,40);
    var feita = store(id)==="1";
    var dias = Math.round((fim-h)/86400000);
    out.push({ id:id, nome:c.evento.replace(/\s*\(prazo\)\s*$/i,""), fim:fim, dias:dias, feita:feita,
      atrasada:!feita && dias<0, desc:acharDesc(c.evento) });
  });
  return out;
}
function acharDesc(nomeEvento){
  var d=window.AGENDA_DATA, chave=nomeEvento.toLowerCase().split("—")[0].split("-")[0].trim().slice(0,14);
  for(var i=0;i<d.anuncios.length;i++){
    if((d.anuncios[i].titulo+d.anuncios[i].texto).toLowerCase().indexOf(chave)!==-1) return d.anuncios[i].texto;
  }
  return "";
}
function eventosFuturos(){
  var h=hoje0();
  return window.AGENDA_DATA.calendario
    .map(function(c){ return { c:c, ini:pDate(c.inicio), fim:pDate(c.fim) }; })
    .filter(function(e){ return e.fim>=h; })
    .sort(function(a,b){ return a.ini-b.ini; });
}

/* ---------- login / tema ---------- */
async function entrar(){
  var s=document.getElementById("senha").value;
  try{
    window.AGENDA_DATA=await descriptografar(s);
    store("mb_key",s);
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    iniciar();
  }catch(e){ document.getElementById("loginErro").style.display="block"; }
}
function sair(){ store("mb_key",""); location.reload(); }
function aplicarTema(t){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("btTheme").textContent = t==="dark"?"☀️":"🌙";
  store("mb_tema",t);
}

/* ---------- inicialização ---------- */
function iniciar(){
  var d=window.AGENDA_DATA;
  if(!window._seenSet){ NOVO_CUTOFF=+(store("mb_seen")||0); store("mb_seen",String(Date.now())); window._seenSet=1; }
  document.getElementById("hSub").textContent = d.aluno.split(" ")[0]+" "+d.aluno.split(" ").slice(-2,-1)+" · "+ (d.turma.indexOf("YEAR 4")!==-1?"Year 4":d.turma);
  document.getElementById("rodape").textContent = "Fonte: Toddle · Atualizado: "+d.atualizadoEm+" · Atualização automática 12h30/15h30/18h30";
  var pend=getTarefas().filter(function(t){return !t.feita;}).length;
  document.getElementById("hPend").textContent = pend===1?"1 pendente":pend+" pendentes";
  document.getElementById("hPend").style.display = pend?"inline-block":"none";
  var tb=document.getElementById("tabTarefas");
  var old=tb.querySelector(".nbadge"); if(old) old.remove();
  if(pend){ var b=document.createElement("span"); b.className="nbadge"; b.textContent=pend; tb.appendChild(b); }
  function navBadge(v,n){
    var t=document.querySelector('nav.tabs button[data-v="'+v+'"]');
    var o=t.querySelector(".nbadge"); if(o) o.remove();
    if(n){ var x=document.createElement("span"); x.className="nbadge"; x.textContent=n; t.appendChild(x); }
  }
  navBadge("avisos", d.anuncios.filter(function(a){ return pDate(a.data)>NOVO_CUTOFF; }).length);
  navBadge("agenda", d.registros.filter(function(r){ return pDate(r.data)>NOVO_CUTOFF; }).length);
  render();
}
document.getElementById("btTheme").addEventListener("click",function(){
  aplicarTema(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");
});
document.querySelectorAll("nav.tabs button").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll("nav.tabs button").forEach(function(x){x.classList.remove("on");});
    b.classList.add("on"); vista=b.dataset.v; render(); window.scrollTo(0,0);
  });
});

/* ---------- views ---------- */
function render(){
  var el=document.getElementById("conteudo");
  if(vista==="inicio") el.innerHTML=vInicio();
  else if(vista==="agenda") el.innerHTML=vAgenda();
  else if(vista==="tarefas") el.innerHTML=vTarefas();
  else if(vista==="avisos") el.innerHTML=vAvisos();
  else el.innerHTML=vEventos();
  ligarEventos();
}

function vInicio(){
  var d=window.AGENDA_DATA, ts=getTarefas();
  var pend=ts.filter(function(t){return !t.feita;}), urg=pend.filter(function(t){return t.dias<=2;});
  var h=new Date().getHours(), sauda = h<12?"Bom dia":(h<18?"Boa tarde":"Boa noite");
  var total=d.calendario.length, passados=d.calendario.filter(function(c){return pDate(c.fim)<hoje0();}).length;
  var pct=Math.round(passados/total*100);
  var evs=eventosFuturos().slice(0,7);
  var html =
    '<div class="hero"><div class="ola">'+sauda+', família</div><h2>Agenda do '+esc(d.aluno.split(" ")[0])+'</h2>'+
    '<div class="sub">'+esc(d.escola)+'</div>'+
    '<div class="stats">'+
      '<div class="stat red"><b>'+pend.length+'</b><span>Pendentes</span></div>'+
      '<div class="stat"><b>'+urg.length+'</b><span>Urgentes</span></div>'+
      '<div class="stat green"><b>'+ts.filter(function(t){return t.feita;}).length+'</b><span>Concluídas</span></div>'+
    '</div></div>';
  if(d.resumoSemana && d.resumoSemana.texto){
    html += '<div class="card"><h3><span class="em">🗞️</span> Resumo da semana '+esc(d.resumoSemana.semana||"")+'</h3><p style="font-size:14px;line-height:1.6;white-space:pre-wrap">'+esc(d.resumoSemana.texto)+'</p></div>';
  }
  html += '<div class="card"><div class="prog-head"><b>📊 Trimestre em andamento</b><span>'+pct+'%</span></div>'+
    '<div class="bar"><i style="width:'+pct+'%"></i></div>'+
    '<div class="prog-sub">'+passados+' de '+total+' marcos do calendário já concluídos</div></div>';
  html += '<div class="card"><h3><span class="em">📅</span> Próximos eventos</h3>';
  if(!evs.length) html+='<div class="vazio">Sem eventos futuros.</div>';
  evs.forEach(function(e){
    var per = e.c.inicio===e.c.fim ? DIAS[e.ini.getDay()] : "até "+fmtCurta(e.fim);
    html += '<div class="ev"><div class="ev-data"><b>'+fmtCurta(e.ini)+'</b><span>'+per+'</span></div>'+
      '<div class="ev-txt"><b>'+esc(e.c.evento)+'</b><span>'+(e.c.inicio===e.c.fim?"dia único":e.c.inicio+" a "+e.c.fim)+'</span></div>'+
      '<span class="pill '+e.c.tipo+'">'+e.c.tipo+'</span></div>';
  });
  html += '</div>';
  var ult=d.registros[0];
  if(ult) html += '<div class="card"><h3><span class="em">📓</span> Último registro da turma</h3>'+
    '<div class="reg-head"><b>'+esc(ult.autor)+'</b><span class="tag2 '+esc(ult.tag)+'">'+esc(ult.tag)+'</span></div>'+
    '<div class="av-meta">'+esc(ult.data)+'</div><p style="font-size:14px;line-height:1.6">'+esc(ult.texto.slice(0,220))+'…</p>'+
    '<button class="ler" data-ir="agenda">Ver agenda completa →</button></div>';
  return html;
}

function vAgenda(){
  var d=window.AGENDA_DATA, q=buscas.agenda.toLowerCase();
  var grupos={}, ordem=[];
  d.registros.forEach(function(r){
    if(q && (r.texto+r.autor).toLowerCase().indexOf(q)===-1) return;
    var dt=pDate(r.data), k=r.data.slice(0,10);
    if(!grupos[k]){ grupos[k]={dt:dt,itens:[]}; ordem.push(k); }
    grupos[k].itens.push(r);
  });
  ordem.sort(function(a,b){ return grupos[b].dt-grupos[a].dt; });
  var html = '<div class="busca">🔍<input placeholder="Buscar aulas, matérias..." value="'+esc(buscas.agenda)+'" data-b="agenda"></div>';
  if(!ordem.length) return html+'<div class="vazio">Nada encontrado.</div>';
  ordem.forEach(function(k){
    var g=grupos[k];
    html += '<div class="dia">'+DIAS[g.dt.getDay()]+', '+g.dt.getDate()+'/'+("0"+(g.dt.getMonth()+1)).slice(-2)+'</div>';
    g.itens.forEach(function(r){
      var mats=parseMaterias(r.texto);
      var novoR = pDate(r.data)>NOVO_CUTOFF ? '<span class="tag2" style="background:var(--red);color:#fff">NOVO</span>' : '';
      html += '<div class="card"><div class="reg-head"><b>'+esc(r.autor)+'</b><span style="display:flex;gap:6px">'+novoR+'<span class="tag2 '+esc(r.tag)+'">'+esc(r.tag)+'</span></span></div>';
      mats.forEach(function(mt,i){
        html += '<div class="mat'+(mats.length===1?" open":"")+'"><div class="mat-h" data-acc="1">'+
          '<span class="ic">'+mt.ic+'</span><b>'+esc(mt.nome||"Registro do dia")+'</b><span class="ar">▼</span></div>'+
          '<div class="mat-b">'+esc(mt.corpo)+'</div></div>';
      });
      html += '</div>';
    });
  });
  return html;
}

function vTarefas(){
  var ts=getTarefas(), f=store("mb_ftar")||"pend";
  var pend=ts.filter(function(t){return !t.feita;}), done=ts.filter(function(t){return t.feita;});
  var pct=ts.length?Math.round(done.length/ts.length*100):0;
  var html = '<div class="card"><div class="prog-head"><b>📊 Progresso geral</b><span>'+done.length+'/'+ts.length+' · '+pct+'%</span></div>'+
    '<div class="bar"><i style="width:'+pct+'%"></i></div></div>';
  html += '<div class="chips">'+
    '<button class="chip'+(f==="pend"?" on":"")+'" data-ft="pend">Pendentes '+(pend.length?"("+pend.length+")":"")+'</button>'+
    '<button class="chip'+(f==="done"?" on":"")+'" data-ft="done">Concluídas</button>'+
    '<button class="chip'+(f==="all"?" on":"")+'" data-ft="all">Todas</button></div>';
  var lista = f==="pend"?pend:(f==="done"?done:ts);
  if(!lista.length) html+='<div class="vazio">'+(f==="pend"?"Nenhuma tarefa pendente 🎉":"Nada por aqui.")+'</div>';
  lista.forEach(function(t){
    var prazo = t.dias===0?"hoje!":(t.dias===1?"amanhã":(t.dias<0?Math.abs(t.dias)+" dias atrás":t.dias+" dias"));
    html += '<div class="card task'+(t.feita?" done":"")+'">'+
      '<div class="cb" data-task="'+esc(t.id)+'">'+(t.feita?"✓":"")+'</div>'+
      '<div class="tx"><b>'+esc(t.nome)+'</b>'+
      '<div class="metas"><span class="m">📋 Tarefa</span><span class="m'+(t.dias<=2&&!t.feita?" hot":"")+'">📆 '+fmtCurta(t.fim)+' · '+prazo+'</span></div>'+
      (t.desc?'<p>'+esc(t.desc.slice(0,180))+'…</p>':'')+
      '</div><span class="st '+(t.feita?"ok":"pend")+'">'+(t.feita?"Concluída":"Pendente")+'</span></div>';
  });
  return html;
}

function vAvisos(){
  var d=window.AGENDA_DATA, q=buscas.avisos.toLowerCase();
  var cats=["Todos","Avaliação","Tarefa","Aviso","Evento","Atividade"];
  var html = '<div class="busca">🔍<input placeholder="Buscar comunicados..." value="'+esc(buscas.avisos)+'" data-b="avisos"></div><div class="chips">';
  cats.forEach(function(c){ html+='<button class="chip'+(filtroAviso===c?" on":"")+'" data-fc="'+c+'">'+c+'</button>'; });
  html += '</div>';
  var lista=d.anuncios.filter(function(a){
    var c=catAviso(a);
    if(filtroAviso!=="Todos" && c!==filtroAviso) return false;
    return !q || (a.titulo+a.texto+a.autor).toLowerCase().indexOf(q)!==-1;
  });
  if(!lista.length) html+='<div class="vazio">Nenhum comunicado encontrado.</div>';
  lista.forEach(function(a,i){
    var c=catAviso(a);
    var novo = pDate(a.data)>NOVO_CUTOFF ? '<span class="av-cat" style="background:var(--red);color:#fff">NOVO</span>' : '';
    var img = "";
    if(a.anexoId && window.AGENDA_DATA.anexos){
      for(var j2=0;j2<window.AGENDA_DATA.anexos.length;j2++){
        var ax=window.AGENDA_DATA.anexos[j2];
        if(ax.id===a.anexoId){ img='<img src="data:'+ax.mime+';base64,'+ax.b64+'" style="width:100%;border-radius:12px;margin-top:10px" alt="Anexo do comunicado">'; break; }
      }
    }
    html += '<div class="card aviso '+c+'"><div class="av-head"><b>'+esc(a.titulo)+'</b><span style="display:flex;gap:6px">'+novo+'<span class="av-cat">'+c+'</span></span></div>'+
      '<div class="av-meta">'+esc(a.data)+' · '+esc(a.autor)+'</div>'+
      '<p class="clamp" id="avp'+i+'">'+esc(a.texto)+'</p>'+
      (a.anexo&&!img?'<div><span class="anexo">📎 '+esc(a.anexo)+'</span></div>':'')+img+
      '<button class="ler" data-exp="avp'+i+'">Ler completo →</button></div>';
  });
  return html;
}

function vEventos(){
  var d=window.AGENDA_DATA, h=hoje0();
  var fut=eventosFuturos();
  var pas=d.calendario.map(function(c){return {c:c,ini:pDate(c.inicio),fim:pDate(c.fim)};})
    .filter(function(e){return e.fim<h;}).sort(function(a,b){return b.ini-a.ini;});
  function bloco(titulo, arr, opac){
    var s='<div class="card"'+(opac?' style="opacity:.62"':'')+'><h3><span class="em">'+(opac?"✅":"📅")+'</span> '+titulo+'</h3>';
    if(!arr.length) s+='<div class="vazio">Nada por aqui.</div>';
    arr.forEach(function(e){
      var per=e.c.inicio===e.c.fim?DIAS[e.ini.getDay()]:"até "+fmtCurta(e.fim);
      s+='<div class="ev"><div class="ev-data"><b>'+fmtCurta(e.ini)+'</b><span>'+per+'</span></div>'+
        '<div class="ev-txt"><b>'+esc(e.c.evento)+'</b><span>'+(e.c.inicio===e.c.fim?"dia único":e.c.inicio+" a "+e.c.fim)+'</span></div>'+
        '<span class="pill '+e.c.tipo+'">'+e.c.tipo+'</span></div>';
    });
    return s+'</div>';
  }
  return bloco("Próximos eventos",fut,false)+bloco("Já aconteceu",pas,true);
}

/* ---------- eventos delegados ---------- */
function ligarEventos(){
  document.querySelectorAll("[data-acc]").forEach(function(h){
    h.addEventListener("click",function(){ h.parentElement.classList.toggle("open"); });
  });
  document.querySelectorAll("[data-b]").forEach(function(inp){
    inp.addEventListener("input",function(){
      buscas[inp.dataset.b]=inp.value; var pos=inp.selectionStart;
      render();
      var novo=document.querySelector('[data-b="'+inp.dataset.b+'"]');
      if(novo){ novo.focus(); novo.setSelectionRange(pos,pos); }
    });
  });
  document.querySelectorAll("[data-fc]").forEach(function(b){
    b.addEventListener("click",function(){ filtroAviso=b.dataset.fc; render(); });
  });
  document.querySelectorAll("[data-ft]").forEach(function(b){
    b.addEventListener("click",function(){ store("mb_ftar",b.dataset.ft); render(); });
  });
  document.querySelectorAll("[data-task]").forEach(function(cb){
    cb.addEventListener("click",function(){
      var k=cb.dataset.task; store(k, store(k)==="1"?"0":"1"); iniciar();
    });
  });
  document.querySelectorAll("[data-exp]").forEach(function(b){
    b.addEventListener("click",function(){
      var p=document.getElementById(b.dataset.exp);
      p.classList.toggle("clamp");
      b.textContent = p.classList.contains("clamp")?"Ler completo →":"Recolher ↑";
    });
  });
  document.querySelectorAll("[data-ir]").forEach(function(b){
    b.addEventListener("click",function(){
      document.querySelector('nav.tabs button[data-v="'+b.dataset.ir+'"]').click();
    });
  });
}

aplicarTema(store("mb_tema")||"light");
if ("serviceWorker" in navigator) { try { navigator.serviceWorker.register("sw.js"); } catch(e){} }

  try{

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    iniciar();
  }catch(e){}
})();
